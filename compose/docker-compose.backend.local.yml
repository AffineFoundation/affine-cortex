# Override for local development; use alongside docker-compose.backend.yml:
#   docker compose -f docker-compose.backend.yml -f docker-compose.backend.local.yml up --build

x-affine-image: &affine_image
  image: affine:local
  build:
    context: .
    dockerfile: Dockerfile

services:
  api:
    <<: *affine_image

  monitor:
    <<: *affine_image

  scheduler:
    <<: *affine_image

  executor:
    <<: *affine_image

  watchtower:
    profiles:
      - production
