# Override for local development; use alongside docker-compose.backend.yml:
#   docker compose -f docker-compose.backend.yml -f docker-compose.backend.local.yml up --build

x-affine-image: &affine_image
  image: affine:local
  build:
    context: .
    dockerfile: Dockerfile

services:
  api:
    <<: *affine_image

  monitor:
    <<: *affine_image

  scheduler:
    <<: *affine_image

  executor:
    <<: *affine_image

  anticopy_refresh:
    <<: *affine_image

  anticopy_worker:
    <<: *affine_image
    # Local R2-blob cache lives inside the container at the default
    # ``/var/cache/anticopy`` (created by AntiCopyR2 on first write).
    # If you want it to survive container restarts, override and mount
    # a host path, e.g.:
    #   volumes:
    #     - /var/cache/affine/anticopy:/var/cache/anticopy

  watchtower:
    profiles:
      - production
