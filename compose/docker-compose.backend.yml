services:
  # API Server — read-only public endpoints (/windows/*, /miners/*, /scores/*, /config).
  api:
    image: affinefoundation/affine:latest
    container_name: affine-api
    restart: unless-stopped
    mem_reservation: "2g"
    mem_limit: "4g"
    volumes:
      - /var/log/affine/api:/var/log/affine/api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_RATE_LIMIT_ENABLED=false
      - API_LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 180s
    command: ["-v", "servers", "api"]

  # Miners Monitor — reads metagraph + on-chain commits, refreshes the
  # ``miners`` table, seeds ``challenge_status='pending'`` for fresh
  # (hotkey, revision) pairs so the challenger queue picks them up.
  monitor:
    image: affinefoundation/affine:latest
    container_name: affine-monitor
    restart: unless-stopped
    mem_reservation: "2g"
    mem_limit: "4g"
    env_file:
      - .env
    volumes:
      - /var/log/affine/monitor:/var/log/affine/monitor
    command: ["-v", "servers", "monitor"]

  # Scheduler — block-tick window state machine. Picks the next challenger,
  # adopts/creates the two Targon workloads, writes per-env task lists into
  # ``current_window.env_tasks`` for executors to consume, waits for
  # executors to fill ``sample_results``, hands off to scorer, then tears
  # down Targon. No Docker / SSH access — talks to Targon directly via its
  # HTTPS API.
  scheduler:
    image: affinefoundation/affine:latest
    container_name: affine-scheduler
    restart: unless-stopped
    mem_reservation: "2g"
    mem_limit: "4g"
    env_file:
      - .env
    volumes:
      - /var/log/affine/scheduler:/var/log/affine/scheduler
      # SSH key needed by the ssh provider (paramiko) to deploy sglang on
      # operator-managed GPU hosts (e.g. b300). Targon-only setups can drop
      # this mount, but it's harmless when unused.
      - ~/.ssh:/root/.ssh:ro
    command: ["-v", "servers", "scheduler"]

  # Executor — per-env subprocess manager. The container forks one
  # subprocess per enabled env; each subprocess owns its own paramiko SSH
  # tunnel to its worker host (via affinetes) and its own asyncio loop.
  # Polls ``current_window.env_tasks[<env>]``, evaluates each (task_id,
  # role) through SDKEnvironment, writes ``sample_results`` directly.
  executor:
    image: affinefoundation/affine:latest
    container_name: affine-executor
    restart: unless-stopped
    mem_reservation: "4g"
    mem_limit: "8g"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.ssh:/root/.ssh
      - /var/log/affine/executor:/var/log/affine/executor
      - ./affinetes_hosts.json:/app/affinetes_hosts.json
    command: ["-v", "servers", "executor"]

  # Teacher (disabled) — generated teacher-model rollouts for the DISTILL
  # env. Requires TEACHER_MODEL / TEACHER_BASE_URL env vars; absent in this
  # deployment so the service is omitted entirely. Re-add when the teacher
  # rollout pipeline is wanted (DISTILL env currently consumes the existing
  # R2 rollout snapshot without it).

  # Anti-Copy Refresh — daily transform of the champion's recent
  # sample_results into the CEAC rollout pool (DDB index + private R2
  # blob). Lightweight CPU-only loop; one global instance.
  anticopy_refresh:
    image: affinefoundation/affine:latest
    container_name: affine-anticopy-refresh
    restart: unless-stopped
    mem_reservation: "1g"
    mem_limit: "2g"
    env_file:
      - .env
    volumes:
      - /var/log/affine/anticopy_refresh:/var/log/affine/anticopy_refresh
    command: ["-v", "servers", "anticopy-refresh"]

  # Anti-Copy Worker — CPU-side service. Owns the DDB / R2 writes
  # (this is where the production credentials live) and drives the
  # GPU host's sglang server entirely over SSH:
  #   - SSH-exec snapshot_download / scan_cache_dir / GC on the GPU host
  #   - SSH-tunnel sglang HTTP through localhost:<ANTICOPY_SGLANG_URL port>
  # The GPU host itself never sees an AWS key — it only hosts sglang.
  #
  # Requires:
  #   ANTICOPY_REMOTE_SSH_HOST   user@gpu-host
  #   ANTICOPY_REMOTE_SSH_KEY    /root/.ssh/id_<...> (mounted RO)
  #   ANTICOPY_SGLANG_URL        http://localhost:<port>  (tunnel forward)
  #   ANTICOPY_HF_CACHE          path on the GPU host (e.g. /data)
  # plus AWS_REGION + R2_ACCESS_KEY/R2_SECRET_KEY in .env.
  #
  # The SSH local-port forward is established by the worker entry
  # script itself (no separate tunnel sidecar needed); see
  # ``affine/src/anticopy/main.py``.
  anticopy_worker:
    image: affinefoundation/affine:latest
    container_name: affine-anticopy-worker
    restart: unless-stopped
    mem_reservation: "2g"
    mem_limit: "4g"
    env_file:
      - .env
    volumes:
      - ~/.ssh:/root/.ssh:ro
      - /var/log/affine/anticopy_worker:/var/log/affine/anticopy_worker
    command: ["-v", "servers", "anticopy-worker"]

  watchtower:
    image: nickfedor/watchtower
    container_name: affine-backend-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 affine-api affine-monitor affine-scheduler affine-executor affine-anticopy-refresh affine-anticopy-worker

networks:
  default:
    name: affine-backend
